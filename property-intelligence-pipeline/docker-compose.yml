# Optional Postgres for Faz 2 — POC runtime uses in-memory PipStore by default.
# Start: docker compose up -d postgres
# Schema: drizzle/0001_initial.sql

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pip
      POSTGRES_PASSWORD: pip
      POSTGRES_DB: property_intelligence
    ports:
      - "5433:5432"
    volumes:
      - pip-postgres-data:/var/lib/postgresql/data
      - ./drizzle/0001_initial.sql:/docker-entrypoint-initdb.d/0001_initial.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pip -d property_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pip-postgres-data:
