name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "property-intelligence-pipeline/**"
  pull_request:
    paths:
      - "property-intelligence-pipeline/**"

defaults:
  run:
    working-directory: property-intelligence-pipeline

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      PLAUD_MODE: mock
      LLM_PROVIDER: mock
      COMPANY_ID: company-iceberg-001
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: property-intelligence-pipeline/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test -- --coverage
