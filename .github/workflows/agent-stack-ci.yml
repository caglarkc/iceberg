name: agent-stack-ci

on:
  pull_request:
    paths:
      - "agent-stack/**"
      - ".github/workflows/agent-stack-ci.yml"
  push:
    branches: [main]
    paths:
      - "agent-stack/**"
      - ".github/workflows/agent-stack-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      LLM_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agent-stack/package-lock.json
      - name: Install
        working-directory: agent-stack
        run: npm ci
      - name: Build
        working-directory: agent-stack
        run: npm run build
      - name: Lint
        working-directory: agent-stack
        run: npm run lint
      - name: Typecheck
        working-directory: agent-stack
        run: npm run typecheck
      - name: Test
        working-directory: agent-stack
        run: npm run test -- --coverage
      - name: Smoke
        working-directory: agent-stack
        run: npm run smoke
