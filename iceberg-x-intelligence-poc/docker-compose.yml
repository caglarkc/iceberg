services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: iceberg
      POSTGRES_PASSWORD: iceberg
      POSTGRES_DB: iceberg_x_intelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./drizzle/0001_initial.sql:/docker-entrypoint-initdb.d/0001_initial.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iceberg -d iceberg_x_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev --workspace @iceberg/api"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgres://iceberg:iceberg@postgres:5432/iceberg_x_intelligence
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_MODEL: ${LLM_MODEL:-mock-poc-model}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "3001:3001"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev --workspace @iceberg/web -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:3001
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    depends_on:
      - api

volumes:
  postgres-data:
