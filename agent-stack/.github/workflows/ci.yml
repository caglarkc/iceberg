name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      LLM_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agent-stack/package-lock.json
      - name: Install
        working-directory: agent-stack
        run: npm ci
      - name: Lint
        working-directory: agent-stack
        run: npm run lint
      - name: Typecheck
        working-directory: agent-stack
        run: npm run typecheck
      - name: Test
        working-directory: agent-stack
        run: npm run test -- --coverage
