services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: zoom
      POSTGRES_PASSWORD: zoom
      POSTGRES_DB: zoom_integration
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./drizzle/0001_initial.sql:/docker-entrypoint-initdb.d/0001_initial.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoom -d zoom_integration"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev --workspace @zoom/api"
    environment:
      NODE_ENV: development
      PORT: 4010
      ZOOM_MODE: mock
      APP_BASE_URL: http://localhost:4010
      DATABASE_URL: postgres://zoom:zoom@postgres:5432/zoom_integration
    ports:
      - "4010:4010"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

  demo-web:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev --workspace @zoom/demo-web -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:4010
    ports:
      - "5174:5174"
    volumes:
      - .:/app
    depends_on:
      - api

volumes:
  postgres-data:
