services:
  zoom-service-mock:
    build:
      context: .
      dockerfile: Dockerfile.zoom-mock
    ports:
      - "4010:4010"
    environment:
      ZOOM_SERVICE_API_KEY: local-zoom-service-key
      PORT: 4010

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: sqlite://./dev.db
      ZOOM_MODE: mock
      ZOOM_SERVICE_URL: http://zoom-service-mock:4010/api/v1
      ZOOM_SERVICE_API_KEY: local-zoom-service-key
      ZOOM_WEBHOOK_SECRET: whsec_local_dev_secret
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      CRM_SERVICE_TOKEN: local-dev-token
      FEATURE_EMBED_SDK: "true"
      FEATURE_FOLLOW_UP_TASKS: "true"
    depends_on:
      - zoom-service-mock
